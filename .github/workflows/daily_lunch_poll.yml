name: Daily Lunch Poll Bot

on:
  schedule:
    # 1. Start Poll at 11:00 AM SGT (03:00 UTC)
    - cron: '0 3 * * 1-5'
    # 2. Weather Alert at 11:15 AM SGT (03:15 UTC)
    - cron: '15 3 * * 1-5'
    # 3. Send Reminder at 11:20 AM SGT (03:20 UTC)
    - cron: '20 3 * * 1-5'
    # 4. Monthly Reset (on last day) at 12:00 PM SGT (04:00 UTC)
    - cron: '0 4 * * 1-5'
  workflow_dispatch: # Enable manual trigger from GitHub UI

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🍱 Send Lunch Poll
        if: github.event.schedule == '0 3 * * 1-5' || github.event_name == 'workflow_dispatch'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: python lunch_bot.py --mode poll

      - name: ⛅ Send Weather Briefing
        if: github.event.schedule == '15 3 * * 1-5'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python lunch_bot.py --mode weather

      - name: 📢 Send Voter Reminder
        if: github.event.schedule == '20 3 * * 1-5'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          REGULARS: ${{ secrets.REGULARS }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: python lunch_bot.py --mode remind
